<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Planner - Navigation Map</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e0e0e0; overflow: hidden; }

  /* ── Toolbar ── */
  #toolbar {
    background: #1a1b26; border-bottom: 1px solid #2a2b3d;
    z-index: 20; position: relative;
  }
  #toolbar-top {
    padding: 10px 20px 6px; display: flex; align-items: center; gap: 12px;
  }
  #toolbar h1 { font-size: 18px; color: #7aa2f7; white-space: nowrap; }
  #toolbar .stats { font-size: 11px; color: #555; white-space: nowrap; }
  #search-box {
    padding: 6px 12px; border-radius: 6px; border: 1px solid #3a3b4d; background: #0f1117;
    color: #e0e0e0; font-size: 13px; width: 200px; outline: none; transition: border 0.2s;
  }
  #search-box:focus { border-color: #7aa2f7; }
  #search-box::placeholder { color: #555; }

  .toolbar-btn {
    padding: 5px 12px; border-radius: 6px; border: 1px solid #3a3b4d; background: #1a1b26;
    color: #888; font-size: 11px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .toolbar-btn:hover { background: #2a2b3d; border-color: #7aa2f7; color: #fff; }
  .toolbar-btn.active { background: #7aa2f7; color: #1a1b26; border-color: #7aa2f7; font-weight: 600; }

  .separator { width: 1px; height: 20px; background: #2a2b3d; }
  .toolbar-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }

  /* ── Legend ── */
  #toolbar-legend {
    padding: 4px 20px 8px; display: flex; align-items: center; gap: 14px;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; cursor: pointer; opacity: 0.7; transition: opacity 0.2s; color: #888; letter-spacing: 0.3px; }
  .legend-item:hover { opacity: 1; }
  .legend-item.dimmed { opacity: 0.2; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── Network ── */
  #network { width: 100%; height: calc(100vh - 62px); }

  /* ── Tooltip ── */
  #tooltip {
    position: absolute; background: #1a1b26; border: 1px solid #7aa2f7; border-radius: 10px;
    padding: 14px 18px; font-size: 13px; max-width: 400px; pointer-events: none;
    display: none; z-index: 30; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
  }
  #tooltip h3 { color: #7aa2f7; margin-bottom: 4px; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  #tooltip .icon { font-size: 18px; }
  #tooltip .route { color: #666; font-family: 'SF Mono', Menlo, monospace; font-size: 11px; margin-bottom: 8px; padding: 3px 8px; background: #0f1117; border-radius: 4px; display: inline-block; }
  #tooltip .file-link { color: #73daca; font-family: 'SF Mono', Menlo, monospace; font-size: 10px; margin-bottom: 8px; display: block; }
  #tooltip ul { padding-left: 16px; margin: 4px 0; }
  #tooltip li { margin: 2px 0; font-size: 12px; color: #bbb; }
  #tooltip .section-label { color: #9ece6a; font-weight: 600; margin-top: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  #tooltip .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; margin-left: 6px; }
  #tooltip .svc-tag { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 9px; font-weight: 600; margin: 1px 2px; background: #2a2040; color: #c0a0ff; border: 1px solid #443060; }

  /* ── Side Panel ── */
  #side-panel {
    position: absolute; top: 62px; right: 0; width: 360px; height: calc(100vh - 62px);
    background: #1a1b26; border-left: 1px solid #2a2b3d; z-index: 15;
    transform: translateX(100%); transition: transform 0.3s ease; overflow-y: auto;
    padding: 0;
  }
  #side-panel.open { transform: translateX(0); }
  #side-panel .panel-header {
    padding: 16px 20px; border-bottom: 1px solid #2a2b3d; display: flex;
    align-items: center; justify-content: space-between; position: sticky; top: 0;
    background: #1a1b26; z-index: 2;
  }
  #side-panel .panel-header h2 { font-size: 16px; color: #7aa2f7; display: flex; align-items: center; gap: 8px; }
  #side-panel .close-btn { background: none; border: none; color: #666; font-size: 20px; cursor: pointer; }
  #side-panel .close-btn:hover { color: #fff; }
  .panel-section { padding: 16px 20px; border-bottom: 1px solid #1f2030; }
  .panel-section h3 { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
  .panel-section .info-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
  .panel-section .info-label { color: #888; }
  .panel-section .info-value { color: #e0e0e0; font-family: 'SF Mono', Menlo, monospace; font-size: 12px; }
  .nav-list { list-style: none; padding: 0; }
  .nav-list li {
    padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 8px; transition: background 0.15s;
  }
  .nav-list li:hover { background: #2a2b3d; }
  .nav-list .nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .nav-list .nav-label { color: #ccc; }
  .nav-list .nav-trigger { color: #666; font-size: 11px; margin-left: auto; }
  .open-file-btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 6px;
    border: 1px solid #3a3b4d; background: #0f1117; color: #73daca; font-size: 12px;
    cursor: pointer; transition: all 0.2s; font-family: 'SF Mono', Menlo, monospace;
    margin-top: 4px; width: 100%; justify-content: center;
  }
  .open-file-btn:hover { background: #73daca; color: #1a1b26; border-color: #73daca; }
  .svc-chip {
    display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 8px;
    font-size: 11px; margin: 3px 4px 3px 0; cursor: pointer; transition: all 0.15s;
    border: 1px solid; white-space: nowrap;
  }
  .svc-chip:hover { filter: brightness(1.3); }
  .svc-chip.svc-db { background: #1a2530; color: #7dcfff; border-color: #2a4050; }
  .svc-chip.svc-sync { background: #1a3020; color: #9ece6a; border-color: #2a4530; }
  .svc-chip.svc-ai { background: #2a2040; color: #bb9af7; border-color: #443060; }
  .svc-chip.svc-reminder { background: #3d2a1a; color: #ff9e64; border-color: #554030; }
  .svc-chip.svc-gamification { background: #3d1f28; color: #f7768e; border-color: #553040; }
  .svc-chip.svc-repo { background: #1f2a3d; color: #7aa2f7; border-color: #2a3a5d; }
  .svc-chips-wrap { display: flex; flex-wrap: wrap; margin-top: 4px; }

  /* ── Export modal ── */
  #export-modal {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center;
  }
  #export-modal.show { display: flex; }
  #export-modal .modal-content {
    background: #1a1b26; border: 1px solid #2a2b3d; border-radius: 12px; padding: 24px;
    min-width: 320px; text-align: center;
  }
  #export-modal h3 { color: #7aa2f7; margin-bottom: 16px; }
  #export-modal .export-options { display: flex; gap: 12px; justify-content: center; }
  #export-modal .export-opt {
    padding: 16px 24px; border-radius: 8px; border: 1px solid #3a3b4d; background: #0f1117;
    color: #ccc; cursor: pointer; transition: all 0.2s; text-align: center; min-width: 100px;
  }
  #export-modal .export-opt:hover { border-color: #7aa2f7; color: #fff; }
  #export-modal .export-opt .ext { font-size: 24px; display: block; margin-bottom: 6px; }
  #export-modal .export-opt .desc { font-size: 11px; color: #888; }
  #export-modal .cancel { margin-top: 16px; color: #666; cursor: pointer; font-size: 13px; }
  #export-modal .cancel:hover { color: #fff; }

  /* ── Keyboard hints ── */
  #kb-hints {
    position: absolute; bottom: 16px; right: 16px; font-size: 11px; color: #444; z-index: 10;
    display: flex; gap: 12px;
  }
  #kb-hints kbd {
    background: #1a1b26; border: 1px solid #2a2b3d; padding: 2px 6px; border-radius: 3px;
    font-family: 'SF Mono', Menlo, monospace; font-size: 10px; color: #666;
  }
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <div id="toolbar-top">
    <h1>Life Planner</h1>
    <span class="stats" id="stats-label">37 screens &middot; 80+ edges</span>

  <div id="toolbar-legend">

    <div class="legend-item" data-group="ai"><div class="legend-dot" style="background:#bb9af7"></div>AI/Coach</div>

</div>

<!-- Network canvas -->
<div id="network"></div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Side detail panel -->
<div id="side-panel">
  <div class="panel-header">
    <h2><span id="panel-icon"></span> <span id="panel-title"></span></h2>
    <button class="close-btn" id="panel-close">&times;</button>
  </div>
  <div id="panel-body"></div>
</div>

<!-- Export modal -->
<div id="export-modal">
  <div class="modal-content">
    <h3>Export Navigation Map</h3>
    <div class="export-options">
      <div class="export-opt" id="export-png"><span class="ext">PNG</span>Image<div class="desc">Raster image</div></div>
      <div class="export-opt" id="export-svg"><span class="ext">SVG</span>Vector<div class="desc">Scalable graphic</div></div>
      <div class="export-opt" id="export-json"><span class="ext">JSON</span>Data<div class="desc">Raw graph data</div></div>
    </div>
    <div class="cancel" id="export-cancel">Cancel</div>
  </div>
</div>

<!-- Keyboard hints -->
<div id="kb-hints">
  <span><kbd>Ctrl</kbd>+<kbd>K</kbd> Search</span>
  <span><kbd>F</kbd> Fit</span>
  <span><kbd>P</kbd> Physics</span>
  <span><kbd>S</kbd> Services</span>
  <span><kbd>E</kbd> Export</span>
  <span><kbd>Esc</kbd> Reset</span>
</div>

// ─── Build vis.js data ──────────────────────────────────────────────
const hubScreens = new Set(["welcome","journal","profile","goals"]);
const nodes = new vis.DataSet(
  Object.entries(screenData).map(([id, s]) => {
    const gc = groupColors[s.group];
    const isHome = id === "home";
    const isHub = hubScreens.has(id);
    return {
      id, label: s.label, group: s.group,
      color: { background: gc.bg, border: gc.bg, highlight: { background: "#fff", border: gc.bg }, hover: { background: "#fff", border: gc.bg } },
      font: { color: isHome || isHub ? gc.font : "#ccc", size: isHome ? 14 : 11, face: "-apple-system, system-ui, sans-serif", bold: isHome || isHub },
      shape: isHome ? "diamond" : (isHub ? "box" : "dot"),
      size: isHome ? 28 : (isHub ? 16 : 12),
      borderWidth: isHome ? 3 : 2,
      shadow: { enabled: true, color: gc.bg + "30", size: 8 },
    };
  })
);

const edges = new vis.DataSet(
  edgeList.map(([from, to, label], i) => ({
    id: `nav_${i}`, from, to,
    font: { size: 0 },
    arrows: { to: { enabled: true, scaleFactor: 0.4, type: "arrow" } },
    color: { color: "#252636", highlight: "#7aa2f7", hover: "#7aa2f7", opacity: 0.5 },
    smooth: { type: from === to ? "curvedCW" : "dynamic", roundness: from === to ? 0.6 : 0.15 },
    width: 1, hoverWidth: 0.5, selectionWidth: 1.5,
  }))
);

// Tooltip helpers
const tooltipData = {};
Object.keys(screenData).forEach(id => {
  tooltipData[id] = {
    outgoing: edgeList.filter(e => e[0] === id && e[1] !== id).map(e => ({ to: e[1], label: e[2] })),
    incoming: edgeList.filter(e => e[1] === id && e[0] !== id).map(e => ({ from: e[0], label: e[2] })),
  };
});

// Service tooltip helpers
Object.keys(serviceData).forEach(id => {
  const svc = serviceData[id];
  tooltipData[id] = {
    outgoing: [],
    incoming: svc.consumers.map(c => ({ from: c, label: "uses" })),
  };
});

// ─── Service layer state ─────────────────────────────────────────────
let servicesVisible = false;
const serviceNodeIds = Object.keys(serviceData);
const serviceEdgeIds = [];

function showServices() {
  servicesVisible = true;
  document.getElementById("btn-services").classList.add("active");

  // Add service nodes
  Object.entries(serviceData).forEach(([id, s]) => {
    const gc = groupColors.service;
    if (!nodes.get(id)) {
      nodes.add({
        id, label: `${iconMap[s.icon] || ""} ${s.label}`, group: "service",
        color: { background: gc.bg + "20", border: gc.bg, highlight: { background: gc.bg + "40", border: gc.bg }, hover: { background: gc.bg + "40", border: gc.bg } },
        font: { color: gc.bg, size: 10, face: "-apple-system, system-ui, sans-serif" },
        shape: "hexagon", size: 16,
        borderWidth: 1.5, shadow: { enabled: true, color: gc.bg + "20", size: 6 },
      });
    }
  });

  // Add service edges
  Object.entries(serviceData).forEach(([svcId, s]) => {
    s.consumers.forEach((screenId, i) => {
      const edgeId = `svc_${svcId}_${screenId}`;
      if (!edges.get(edgeId)) {
        edges.add({
          id: edgeId, from: screenId, to: svcId,
          font: { size: 0 },
          arrows: { to: { enabled: true, scaleFactor: 0.3, type: "arrow" } },
          color: { color: groupColors.service.bg + "25", highlight: groupColors.service.bg, hover: groupColors.service.bg, opacity: 0.2 },
          smooth: { type: "curvedCW", roundness: 0.12 },
          width: 0.8, dashes: [3, 4], hoverWidth: 0.5,
        });
        serviceEdgeIds.push(edgeId);
      }
    });
  });

  updateStats();
}

function hideServices() {
  servicesVisible = false;
  document.getElementById("btn-services").classList.remove("active");

  serviceNodeIds.forEach(id => { try { nodes.remove(id); } catch(e) {} });
  serviceEdgeIds.forEach(id => { try { edges.remove(id); } catch(e) {} });
  serviceEdgeIds.length = 0;

  updateStats();
}

function updateStats() {
  const screenCount = Object.keys(screenData).length;
  const svcCount = servicesVisible ? Object.keys(serviceData).length : 0;
  const edgeCount = edgeList.length + serviceEdgeIds.length;
  const label = servicesVisible
    ? `${screenCount} screens + ${svcCount} services &middot; ${edgeCount}+ edges`
    : `${screenCount} screens &middot; ${edgeList.length}+ edges`;
  document.getElementById("stats-label").innerHTML = label;
}

// ─── Network ────────────────────────────────────────────────────────
const container = document.getElementById("network");
let physicsEnabled = true;

const network = new vis.Network(container, { nodes, edges }, {
  physics: {
    enabled: true,
    solver: "forceAtlas2Based",
    forceAtlas2Based: { gravitationalConstant: -120, centralGravity: 0.005, springLength: 160, springConstant: 0.03, damping: 0.5 },
    stabilization: { iterations: 500, fit: true },
  },
  interaction: { hover: true, tooltipDelay: 100, zoomView: true, dragView: true, multiselect: true, navigationButtons: false },
  layout: { improvedLayout: true },
  edges: { selectionWidth: 2 },
});

// ─── Tooltip ────────────────────────────────────────────────────────
const tooltip = document.getElementById("tooltip");

network.on("hoverNode", (params) => {
  const id = params.node;
  const s = screenData[id] || serviceData[id];
  const t = tooltipData[id];
  if (!s) return;

  const gc = groupColors[s.group];
  let html = `<h3><span class="icon">${iconMap[s.icon] || ""}</span> ${s.label}
    <span class="badge" style="background:${gc.bg};color:${gc.font}">${s.group}</span></h3>`;

  if (s.route) html += `<div class="route">${s.route}</div>`;
  if (s.file) html += `<div class="file-link">${basePath}${s.file}</div>`;
  if (s.desc) html += `<div style="color:#aaa;font-size:12px;margin-bottom:8px">${s.desc}</div>`;

  // Shared services tags for screens
  if (s.services && s.services.length) {
    html += `<div class="section-label">Shared Services</div><div style="margin:4px 0">`;
    s.services.forEach(svc => { html += `<span class="svc-tag">${svc}</span>`; });
    html += `</div>`;
  }

  // Consumers for service nodes
  if (s.consumers && s.consumers.length) {
    html += `<div class="section-label">Used by (${s.consumers.length} screens)</div><ul>`;
    s.consumers.forEach(cId => {
      const cs = screenData[cId];
      if (cs) html += `<li>${iconMap[cs.icon] || ""} ${cs.label}</li>`;
    });
    html += `</ul>`;
  }

  if (t && t.outgoing.length) {
    html += `<div class="section-label">Navigates to (${t.outgoing.length})</div><ul>`;
    t.outgoing.forEach(e => {
      const target = screenData[e.to];
      html += `<li>${iconMap[target?.icon] || ""} ${target?.label || e.to} <span style="color:#555">— ${e.label}</span></li>`;
    });
    html += `</ul>`;
  }
  if (t && t.incoming.length && !s.consumers) {
    html += `<div class="section-label">Reached from (${t.incoming.length})</div><ul>`;
    t.incoming.forEach(e => {
      const source = screenData[e.from];
      html += `<li>${iconMap[source?.icon] || ""} ${source?.label || e.from} <span style="color:#555">— ${e.label}</span></li>`;
    });
    html += `</ul>`;
  }
  tooltip.innerHTML = html;
  tooltip.style.display = "block";
});
network.on("blurNode", () => { tooltip.style.display = "none"; });
container.addEventListener("mousemove", (e) => {
  if (tooltip.style.display !== "block") return;
  const x = Math.min(e.pageX + 16, window.innerWidth - 420);
  const y = Math.min(e.pageY + 16, window.innerHeight - 300);
  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";
});

// ─── Click → Side Panel ─────────────────────────────────────────────
const sidePanel = document.getElementById("side-panel");
const panelBody = document.getElementById("panel-body");
const panelTitle = document.getElementById("panel-title");
const panelIcon = document.getElementById("panel-icon");
document.getElementById("panel-close").onclick = () => sidePanel.classList.remove("open");

network.on("doubleClick", (params) => {
  if (!params.nodes.length) return;
  openPanel(params.nodes[0]);
});

function openPanel(id) {
  const s = screenData[id] || serviceData[id];
  const t = tooltipData[id];
  if (!s) return;

  const gc = groupColors[s.group];
  panelIcon.textContent = iconMap[s.icon] || "";
  panelTitle.textContent = s.label;

  let html = `
    <div class="panel-section">
      <h3>Details</h3>
      <div class="info-row"><span class="info-label">Route</span><span class="info-value">${s.route || "—"}</span></div>
      <div class="info-row"><span class="info-label">Group</span><span class="info-value" style="color:${gc.bg}">${s.group}</span></div>
      <div class="info-row"><span class="info-label">Outgoing</span><span class="info-value">${t ? t.outgoing.length : 0}</span></div>
      <div class="info-row"><span class="info-label">Incoming</span><span class="info-value">${t ? t.incoming.length : 0}</span></div>
    </div>`;

  if (s.file) {
    html += `
    <div class="panel-section">
      <h3>Source File</h3>
      <button class="open-file-btn" onclick="copyPath('${basePath}${s.file}')">
        📂 ${s.file} <span style="color:#666;font-size:10px">(click to copy)</span>
      </button>
    </div>`;
  }

  if (s.desc) {
    html += `
    <div class="panel-section">
      <h3>Description</h3>
      <div style="font-size:13px;color:#bbb">${s.desc}</div>
    </div>`;
  }

  // Shared services section for screens
  if (s.services && s.services.length) {
    html += `<div class="panel-section"><h3>Shared Services & Use Cases</h3><div class="svc-chips-wrap">`;
    s.services.forEach(svc => {
      let chipClass = "svc-repo";
      if (svc.includes("Database") || svc.includes("Shared")) chipClass = "svc-db";
      else if (svc.includes("Sync")) chipClass = "svc-sync";
      else if (svc.includes("Ai") || svc.includes("Gemini")) chipClass = "svc-ai";
      else if (svc.includes("Reminder")) chipClass = "svc-reminder";
      else if (svc.includes("Gamification")) chipClass = "svc-gamification";
      else if (svc.includes("UseCase")) chipClass = "svc-ai";
      html += `<span class="svc-chip ${chipClass}">${svc}</span>`;
    });
    html += `</div></div>`;
  }

  // Consumers section for service nodes
  if (s.consumers && s.consumers.length) {
    html += `<div class="panel-section"><h3>Used By (${s.consumers.length} screens)</h3><ul class="nav-list">`;
    s.consumers.forEach(cId => {
      const cs = screenData[cId];
      if (!cs) return;
      const tgc = groupColors[cs.group];
      html += `<li onclick="focusNode('${cId}')">
        <span class="nav-dot" style="background:${tgc.bg}"></span>
        <span class="nav-label">${iconMap[cs.icon] || ""} ${cs.label}</span>
      </li>`;
    });
    html += `</ul></div>`;
  }

  if (t && t.outgoing.length) {
    html += `<div class="panel-section"><h3>Navigates To</h3><ul class="nav-list">`;
    t.outgoing.forEach(e => {
      const target = screenData[e.to];
      const tgc = groupColors[target?.group];
      html += `<li onclick="focusNode('${e.to}')">
        <span class="nav-dot" style="background:${tgc?.bg || '#555'}"></span>
        <span class="nav-label">${iconMap[target?.icon] || ""} ${target?.label || e.to}</span>
        <span class="nav-trigger">${e.label}</span>
      </li>`;
    });
    html += `</ul></div>`;
  }

  if (t && t.incoming.length && !s.consumers) {
    html += `<div class="panel-section"><h3>Reached From</h3><ul class="nav-list">`;
    t.incoming.forEach(e => {
      const source = screenData[e.from];
      const sgc = groupColors[source?.group];
      html += `<li onclick="focusNode('${e.from}')">
        <span class="nav-dot" style="background:${sgc?.bg || '#555'}"></span>
        <span class="nav-label">${iconMap[source?.icon] || ""} ${source?.label || e.from}</span>
        <span class="nav-trigger">${e.label}</span>
      </li>`;
    });
    html += `</ul></div>`;
  }

  panelBody.innerHTML = html;
  sidePanel.classList.add("open");
}

function focusNode(id) {
  network.focus(id, { scale: 1.5, animation: { duration: 400, easingFunction: "easeInOutCubic" } });
  network.selectNodes([id]);
  highlightConnected(id);
  openPanel(id);
}

function copyPath(path) {
  navigator.clipboard.writeText(path).then(() => {
    const btn = event.target.closest('.open-file-btn');
    const orig = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => btn.innerHTML = orig, 1500);
  });
}

// ─── Highlight connected ────────────────────────────────────────────
function highlightConnected(selected) {
  const connectedEdges = network.getConnectedEdges(selected);
  const connectedNodes = new Set(network.getConnectedNodes(selected));
  connectedNodes.add(selected);

  nodes.forEach(n => nodes.update({ id: n.id, opacity: connectedNodes.has(n.id) ? 1 : 0.08 }));
  edges.forEach(e => {
    const isC = connectedEdges.includes(e.id);
    edges.update({ id: e.id, color: { color: isC ? "#7aa2f7" : "#252636", opacity: isC ? 1 : 0.03 }, width: isC ? 2.5 : 0.5 });
  });
}

function resetHighlight() {
  nodes.forEach(n => nodes.update({ id: n.id, opacity: 1 }));
  edges.forEach(e => {
    const isServiceEdge = typeof e.id === "string" && e.id.startsWith("svc_");
    edges.update({
      id: e.id,
      color: { color: isServiceEdge ? groupColors.service.bg + "30" : "#252636", opacity: isServiceEdge ? 0.25 : 0.5 },
      width: isServiceEdge ? 0.8 : 1,
    });
  });
}

network.on("click", (params) => {
  if (params.nodes.length === 0) { resetHighlight(); return; }
  highlightConnected(params.nodes[0]);
});

// ─── Search ─────────────────────────────────────────────────────────
const searchBox = document.getElementById("search-box");
let searchResults = [];
let searchIndex = -1;

searchBox.addEventListener("input", () => {
  const q = searchBox.value.toLowerCase().trim();
  if (!q) { resetHighlight(); searchResults = []; searchIndex = -1; return; }

  const allData = { ...screenData, ...(servicesVisible ? serviceData : {}) };
  searchResults = Object.entries(allData)
    .filter(([id, s]) => s.label.toLowerCase().includes(q) || (s.route || "").toLowerCase().includes(q) || s.group.toLowerCase().includes(q) || (s.services || []).some(sv => sv.toLowerCase().includes(q)))
    .map(([id]) => id);

  if (searchResults.length === 0) { resetHighlight(); return; }

  const matchSet = new Set(searchResults);
  nodes.forEach(n => nodes.update({ id: n.id, opacity: matchSet.has(n.id) ? 1 : 0.1 }));
  edges.forEach(e => {
    const isMatch = matchSet.has(e.from) && matchSet.has(e.to);
    edges.update({ id: e.id, color: { color: isMatch ? "#7aa2f7" : "#2a2b3d", opacity: isMatch ? 0.8 : 0.03 }, width: isMatch ? 2.5 : 1 });
  });

  if (searchResults.length) {
    searchIndex = 0;
    network.focus(searchResults[0], { scale: 1.2, animation: { duration: 300, easingFunction: "easeInOutCubic" } });
    network.selectNodes([searchResults[0]]);
  }
});

searchBox.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && searchResults.length > 1) {
    searchIndex = (searchIndex + 1) % searchResults.length;
    const id = searchResults[searchIndex];
    network.focus(id, { scale: 1.2, animation: { duration: 300, easingFunction: "easeInOutCubic" } });
    network.selectNodes([id]);
  }
  if (e.key === "Escape") { searchBox.value = ""; searchBox.blur(); resetHighlight(); }
});

// ─── Legend filtering ───────────────────────────────────────────────
const hiddenGroups = new Set();
document.querySelectorAll(".legend-item").forEach(el => {
  el.addEventListener("click", () => {
    const g = el.dataset.group;
    if (hiddenGroups.has(g)) { hiddenGroups.delete(g); el.classList.remove("dimmed"); }
    else { hiddenGroups.add(g); el.classList.add("dimmed"); }

    nodes.forEach(n => {
      const s = screenData[n.id] || serviceData[n.id];
      if (s) nodes.update({ id: n.id, hidden: hiddenGroups.has(s.group) });
    });
  });
});

document.getElementById("btn-fit").onclick = () => network.fit({ animation: { duration: 400, easingFunction: "easeInOutCubic" } });

document.getElementById("btn-physics").onclick = () => {

const exportModal = document.getElementById("export-modal");
document.getElementById("btn-export").onclick = () => exportModal.classList.add("show");
document.getElementById("export-cancel").onclick = () => exportModal.classList.remove("show");
exportModal.addEventListener("click", (e) => { if (e.target === exportModal) exportModal.classList.remove("show"); });

document.getElementById("export-png").onclick = () => {
  const canvas = container.querySelector("canvas");
  if (!canvas) return;
  const link = document.createElement("a");
  link.download = "lifeplanner-navigation-map.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
  exportModal.classList.remove("show");
};

document.getElementById("export-svg").onclick = () => {
  const positions = network.getPositions();

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" style="background:#0f1117">
    <style>text{font-family:system-ui;font-size:12px;fill:#e0e0e0}line{stroke:#2a2b3d;stroke-width:1}</style>`;

  const allX = Object.values(positions).map(p => p.x);
  const allY = Object.values(positions).map(p => p.y);
  const minX = Math.min(...allX), maxX = Math.max(...allX);
  const minY = Math.min(...allY), maxY = Math.max(...allY);
  const sx = 1600 / (maxX - minX || 1), sy = 900 / (maxY - minY || 1);
  const s = Math.min(sx, sy, 2);
  const ox = 960, oy = 540;
  const tx = (x) => (x - (minX+maxX)/2) * s + ox;
  const ty = (y) => (y - (minY+maxY)/2) * s + oy;

  edgeList.forEach(([from, to]) => {
    if (!positions[from] || !positions[to]) return;
    svg += `<line x1="${tx(positions[from].x)}" y1="${ty(positions[from].y)}" x2="${tx(positions[to].x)}" y2="${ty(positions[to].y)}" stroke-opacity="0.4"/>`;
  });

  Object.entries(positions).forEach(([id, pos]) => {
    const sc = screenData[id] || serviceData[id];
    if (!sc) return;
    const gc = groupColors[sc.group];
    const x = tx(pos.x), y = ty(pos.y);
    svg += `<circle cx="${x}" cy="${y}" r="12" fill="${gc.bg}" stroke="${gc.bg}" stroke-width="2"/>`;
    svg += `<text x="${x}" y="${y + 24}" text-anchor="middle" fill="${gc.bg}" font-size="10">${sc.label}</text>`;
  });

  svg += `</svg>`;
  const blob = new Blob([svg], { type: "image/svg+xml" });
  const link = document.createElement("a");
  link.download = "lifeplanner-navigation-map.svg";
  link.href = URL.createObjectURL(blob);
  link.click();
  exportModal.classList.remove("show");
};

document.getElementById("export-json").onclick = () => {
  const data = {
    screens: screenData,
    services: serviceData,
    edges: edgeList.map(([from, to, label]) => ({ from, to, label })),
    positions: network.getPositions(),
    exportedAt: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const link = document.createElement("a");
  link.download = "lifeplanner-navigation-map.json";
  link.href = URL.createObjectURL(blob);
  link.click();
  exportModal.classList.remove("show");
};

// ─── Keyboard shortcuts ─────────────────────────────────────────────
document.addEventListener("keydown", (e) => {
  if (document.activeElement === searchBox) return;

  if ((e.ctrlKey || e.metaKey) && e.key === "k") {
    e.preventDefault();
    searchBox.focus();
    searchBox.select();
  }
  if (e.key === "f" || e.key === "F") network.fit({ animation: { duration: 400, easingFunction: "easeInOutCubic" } });
  if (e.key === "p" || e.key === "P") document.getElementById("btn-physics").click();
  if (e.key === "s" || e.key === "S") document.getElementById("btn-services").click();
  if (e.key === "e" || e.key === "E") exportModal.classList.add("show");
  if (e.key === "Escape") {
    resetHighlight();
    sidePanel.classList.remove("open");
    exportModal.classList.remove("show");
    searchBox.value = "";
  }
});

// ─── Stabilization done → reduce physics ─────────────────────────────
network.on("stabilizationIterationsDone", () => {
  network.setOptions({
    physics: {
      forceAtlas2Based: { gravitationalConstant: -50, centralGravity: 0.003, springConstant: 0.02 },
    }
  });
});
</script>
</body>
</html>
