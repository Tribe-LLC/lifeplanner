<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Planner - Email Verified</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0F0F1A 0%, #1a1a2e 50%, #0F0F1A 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            text-align: center;
            padding: 48px 32px;
            max-width: 400px;
        }
        .icon { font-size: 64px; margin-bottom: 24px; }
        h1 { font-size: 24px; margin-bottom: 12px; }
        p { color: rgba(255,255,255,0.7); margin-bottom: 32px; line-height: 1.5; }
        .btn {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 16px 32px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
        }
        .stores { margin-top: 16px; color: rgba(255,255,255,0.5); font-size: 14px; }
    </style>
    <script>
        // Try to open the app via custom scheme as fallback
        window.onload = function() {
            var hash = window.location.hash;
            if (hash) {
                // Try custom scheme redirect
                window.location.href = 'lifeplanner://auth' + hash;
            }
        };
    </script>
</head>
<body>
    <div class="card">
        <div class="icon">&#10003;</div>
        <h1>Email Verified!</h1>
        <p>Your email has been verified successfully. Open the Life Planner app to continue.</p>
        <a class="btn" href="lifeplanner://auth">Open Life Planner</a>
        <p class="stores">If the app doesn't open, make sure Life Planner is installed.</p>
    </div>
</body>
</html>
